<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">

  <!-- Background -->
  <rect id="background" width="128" height="128" rx="28" fill="#0A0A0A"/>

  <!-- Rings — centered at hook tip (78, 88) -->
  <circle id="ring-outer" cx="78" cy="88" r="52" fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.07"/>
  <circle id="ring-mid" cx="78" cy="88" r="36" fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.13"/>
  <circle id="ring-inner" cx="78" cy="88" r="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.22"/>

  <!-- Y Lettermark -->
  <g id="Y-lettermark">
    <!-- Left arm -->
    <line id="arm-left" x1="28" y1="18" x2="58" y2="52" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
    <!-- Right arm -->
    <line id="arm-right" x1="88" y1="18" x2="58" y2="52" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
    <!-- Stem -->
    <line id="stem" x1="58" y1="52" x2="58" y2="74" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
    <!-- Hook curl — tip lands at ring center (78, 88) -->
    <path id="hook" d="M58 74 Q58 96 78 96 Q98 96 98 76 Q98 60 82 58" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Accent dot — center of rings and hook tip -->
  <g id="accent-dot">
    <circle id="dot-outer" cx="78" cy="88" r="9" fill="#FF3366"/>
    <circle id="dot-inner" cx="78" cy="88" r="4" fill="#0A0A0A"/>
  </g>

</svg>
